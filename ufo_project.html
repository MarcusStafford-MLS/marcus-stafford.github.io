<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>West Coast UFO Sightings Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

    <style>
        #map { height: 700px; width: 100%; }
        .stats-panel {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            font-size: 14px;
        }
        .filters { margin-bottom: 15px; }
    </style>
</head>

<body>
<div class="container text-center">

    <!-- Header -->
    <div class="row">
        <div class="col">
            <h2>West Coast UFO Sightings</h2>
            <p>Reported UFO sightings across California, Oregon, and Washington.</p>
            <p>Filter by state, year, or shape, and toggle the heatmap to explore patterns.</p>
        </div>
    </div>

    <!-- Filters -->
    <div class="row filters">
        <div class="col-md-2 offset-md-2">
            <select id="stateFilter" class="form-select">
                <option value="all">All States</option>
                <option value="ca">California</option>
                <option value="or">Oregon</option>
                <option value="wa">Washington</option>
            </select>
        </div>

        <div class="col-md-2">
            <select id="yearFilter" class="form-select">
                <option value="all">All Years</option>
            </select>
        </div>

        <div class="col-md-2">
            <select id="shapeFilter" class="form-select">
                <option value="all">All Shapes</option>
            </select>
        </div>

        <div class="col-md-2">
            <div class="form-check">
                <input type="checkbox" id="heatmapToggle" class="form-check-input">
                <label class="form-check-label" for="heatmapToggle">Show Heatmap</label>
            </div>
        </div>
    </div>

    <!-- Map -->
    <div class="row">
        <div class="col">
            <div id="map"></div>
        </div>
    </div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- MarkerCluster JS -->
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<!-- Heatmap plugin -->
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<!-- UFO data -->

<script src="ufo_west.js"></script>
<script>
// --- Initialize map ---
var map = L.map('map').setView([37, -120], 5);

// Base map
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

// Marker cluster group
var markers = L.markerClusterGroup({
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
    disableClusteringAtZoom: 12
});

// Heatmap layer
var heatLayer;

// --- Stats panel ---
var stats = L.control({position: 'topright'});
stats.onAdd = function(map) {
    this._div = L.DomUtil.create('div', 'stats-panel');
    this.update();
    return this._div;
};
stats.update = function(count=0, state='ALL', year='ALL', shape='ALL') {
    this._div.innerHTML = `
        <h5>UFO Sightings Stats</h5>
        <b>State:</b> ${state.toUpperCase()}<br>
        <b>Year:</b> ${year}<br>
        <b>Shape:</b> ${shape}<br>
        <b>Total sightings:</b> ${count}
    `;
};
stats.addTo(map);

// --- Populate year dropdown ---
let years = new Set();
let shapes = new Set();
ufoData.features.forEach(f => {
    if (f.properties.datetime) years.add(f.properties.datetime.split('-')[0]);
    if (f.properties.shape) shapes.add(f.properties.shape.toLowerCase());
});

let yearSelect = document.getElementById("yearFilter");
[...years].sort().forEach(y => {
    let opt = document.createElement("option");
    opt.value = y;
    opt.textContent = y;
    yearSelect.appendChild(opt);
});

let shapeSelect = document.getElementById("shapeFilter");
[...shapes].sort().forEach(s => {
    let opt = document.createElement("option");
    opt.value = s;
    opt.textContent = s.charAt(0).toUpperCase() + s.slice(1);
    shapeSelect.appendChild(opt);
});

// --- Render function ---
function renderData() {
    markers.clearLayers();
    if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }

    let stateVal = document.getElementById("stateFilter").value;
    let yearVal = document.getElementById("yearFilter").value;
    let shapeVal = document.getElementById("shapeFilter").value;

    let filteredFeatures = [];
    let shapeCount = {};

    ufoData.features.forEach(f => {
        let stateMatch = (stateVal === "all") || (f.properties.state === stateVal);
        let yearMatch = true;
        if (yearVal !== "all" && f.properties.datetime) {
            yearMatch = (f.properties.datetime.split('-')[0] === yearVal);
        }
        let shapeMatch = (shapeVal === "all") || (f.properties.shape && f.properties.shape.toLowerCase() === shapeVal);
        if (stateMatch && yearMatch && shapeMatch) filteredFeatures.push(f);

        if (f.properties.shape) {
            let shp = f.properties.shape.toLowerCase();
            shapeCount[shp] = (shapeCount[shp] || 0) + 1;
        }
    });

    // Most common shape in filtered set
    let mostCommonShape = 'ALL';
    if (filteredFeatures.length > 0) {
        let countMap = {};
        filteredFeatures.forEach(f => {
            if (f.properties.shape) {
                let shp = f.properties.shape.toLowerCase();
                countMap[shp] = (countMap[shp] || 0) + 1;
            }
        });
        mostCommonShape = Object.keys(countMap).reduce((a,b) => countMap[a]>countMap[b]?a:b);
    }

    // Check if heatmap is toggled
    if (document.getElementById("heatmapToggle").checked) {
        let heatPoints = filteredFeatures.map(f => [f.geometry.coordinates[1], f.geometry.coordinates[0], 1]);
        heatLayer = L.heatLayer(heatPoints, {radius: 25, blur: 15, maxZoom: 12});
        heatLayer.addTo(map);
    } else {
        // Add filtered points to cluster
        L.geoJSON(filteredFeatures, {
            pointToLayer: function(f, latlng) {
                return L.circleMarker(latlng, {
                    radius: 6,
                    fillColor: "#ff6600",
                    color: "#000",
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.8
                });
            },
            onEachFeature: function(f, layer) {
                let popup = `
                    <b>${f.properties.city || ''}, ${f.properties.state || ''}</b><br>
                    ${f.properties.datetime || ''}<br>
                    Shape: ${f.properties.shape || ''}<br>
                    ${f.properties.comments || ''}
                `;
                layer.bindPopup(popup);
                markers.addLayer(layer);
            }
        });
        map.addLayer(markers);
    }

        // --- Zoom logic ---
        if (stateVal !== "all") {
            let bounds = markers.getBounds();
            if (bounds.isValid()) map.fitBounds(bounds, { padding: [30,30] });
        }
        // "All states" does not reset view anymore

    stats.update(filteredFeatures.length, stateVal, yearVal, mostCommonShape);
}

// --- Initial render ---
renderData();

// --- Event listeners ---
document.getElementById("stateFilter").addEventListener("change", renderData);
document.getElementById("yearFilter").addEventListener("change", renderData);
document.getElementById("shapeFilter").addEventListener("change", renderData);
document.getElementById("heatmapToggle").addEventListener("change", renderData);

</script>
</body>
</html>
